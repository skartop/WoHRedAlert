<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WoH Monitor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h3>⚔️ WoH Monitor</h3>
  <label><input type="checkbox" id="enabled" /> Enabled</label>

  <div class="field"><label>Poll ms</label><input id="pollMs" type="number" min="1000" step="500" /></div>
  <div class="field"><label>Cooldown ms</label><input id="cooldown" type="number" min="1000" step="1000" /></div>
  <div class="field"><label>Telegram bot token</label><input id="tgToken" type="password" /></div>
  <div class="field"><label>Telegram chat id</label><input id="tgChat" type="text" /></div>
  <div class="field"><label>Discord webhook</label><input id="dcWebhook" type="text" /></div>

  <button id="save">Save</button>
  <button id="refresh">Refresh status</button>
  <button id="testAlert">Test alert</button>
  <pre id="status">Status: ...</pre>

  <script src="popup.js"></script>
</body>
</html>
